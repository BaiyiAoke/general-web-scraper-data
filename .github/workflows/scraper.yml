name: Web Data Scraper

on:
  workflow_dispatch:     # 支持手动触发

permissions:
  contents: write

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Run scraper for website
        run: node scraper.js

      - name: Upload output_json
        uses: actions/upload-artifact@v4
        with:
          name: output_json
          path: output_json/

      - name: Upload output_excel
        uses: actions/upload-artifact@v4
        with:
          name: output_excel
          path: output_excel/
